<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ID OCR Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        /* Pawnereno Base Styles */
        body { background-color: #0a0b0d; color: white; font-family: sans-serif; }
        .lens-box {
            position: absolute;
            border: 2px solid rgba(0, 255, 65, 0.5); /* Terminal Green */
            background-color: rgba(0, 255, 65, 0.1);
            cursor: crosshair;
            transition: all 0.2s;
            border-radius: 2px;
        }
        .lens-box:hover {
            border-color: #00ff41;
            background-color: rgba(0, 255, 65, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            z-index: 10;
        }
    </style>
</head>
<body class="p-8">

<div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <div class="bg-[#141518] border border-white/5 p-6 rounded-xl shadow-2xl">
        <h3 class="text-[#00ff41] font-black uppercase tracking-widest text-[11px] mb-4 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>
            Optical ID Scanner
        </h3>
        
        <input type="file" id="id_upload" accept="image/*" class="w-full text-xs text-slate-500 file:bg-blue-600 file:text-white file:border-0 file:px-4 file:py-2 file:mr-4 file:rounded file:font-bold file:uppercase file:cursor-pointer mb-4 cursor-pointer">
        
        <p id="scan_status" class="text-[10px] text-slate-500 font-mono uppercase tracking-widest mb-2 hidden">
            <span class="animate-pulse text-amber-500">Initializing AI Engine...</span>
        </p>

        <div id="image_container" class="relative w-full border border-white/10 bg-[#0a0b0d] overflow-hidden hidden">
            <img id="scanned_image" class="w-full h-auto block" alt="ID Scan">
            <div id="overlay_container" class="absolute inset-0 pointer-events-none"></div>
        </div>
    </div>

    <div class="bg-[#141518] border border-white/5 p-6 rounded-xl shadow-2xl">
        <h3 class="text-white font-black uppercase tracking-widest text-[11px] mb-4">Extracted Data</h3>
        <p class="text-[10px] text-slate-400 mb-6 font-mono">Click a highlighted box on the image, then click the input field you want to fill.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[9px] font-black text-slate-500 uppercase mb-1">Target Field (Select One)</label>
                <select id="active_input_target" class="w-full bg-[#0a0b0d] border border-blue-500/50 p-3 text-blue-400 text-xs font-mono outline-none">
                    <option value="input_first">First Name</option>
                    <option value="input_last">Last Name</option>
                    <option value="input_id_no">ID Number</option>
                </select>
            </div>

            <div>
                <label class="block text-[9px] font-black text-slate-500 uppercase mb-1">First Name</label>
                <input type="text" id="input_first" class="w-full bg-[#0a0b0d] border border-white/10 p-3 text-white text-xs font-mono outline-none focus:border-white/30">
            </div>
            <div>
                <label class="block text-[9px] font-black text-slate-500 uppercase mb-1">Last Name</label>
                <input type="text" id="input_last" class="w-full bg-[#0a0b0d] border border-white/10 p-3 text-white text-xs font-mono outline-none focus:border-white/30">
            </div>
            <div>
                <label class="block text-[9px] font-black text-slate-500 uppercase mb-1">ID Number</label>
                <input type="text" id="input_id_no" class="w-full bg-[#0a0b0d] border border-white/10 p-3 text-white text-xs font-mono outline-none focus:border-white/30">
            </div>
        </div>
    </div>

</div>

<script>
    const fileInput = document.getElementById('id_upload');
    const imageElement = document.getElementById('scanned_image');
    const imageContainer = document.getElementById('image_container');
    const overlayContainer = document.getElementById('overlay_container');
    const statusText = document.getElementById('scan_status');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // 1. Show the image on screen
        const reader = new FileReader();
        reader.onload = function(event) {
            imageElement.src = event.target.result;
            imageContainer.classList.remove('hidden');
            overlayContainer.innerHTML = ''; // Clear old boxes
            
            // Wait for image to render so we get accurate physical dimensions
            imageElement.onload = () => {
                runOCR(imageElement);
            };
        }
        reader.readAsDataURL(file);
    });

    function runOCR(imgEl) {
        statusText.classList.remove('hidden');
        statusText.innerHTML = '<span class="animate-pulse text-amber-500">Scanning Document Matrix... Please wait.</span>';

        // 2. Run Tesseract AI
        Tesseract.recognize(
            imgEl.src,
            'eng',
            { logger: m => console.log(m) } // Logs progress to browser console
        ).then(({ data: { words } }) => {
            statusText.innerHTML = '<span class="text-[#00ff41]">Scan Complete. Click highlighted text to extract.</span>';
            overlayContainer.style.pointerEvents = 'auto'; // Make boxes clickable

            // 3. Calculate Scale (Tesseract gives coordinates based on ORIGINAL image size, we need to scale to DISPLAYED size)
            const scaleX = imgEl.clientWidth / imgEl.naturalWidth;
            const scaleY = imgEl.clientHeight / imgEl.naturalHeight;

            // 4. Draw the "Google Lens" Boxes
            words.forEach(word => {
                // Ignore tiny garbage characters
                if (word.text.length < 2 || word.confidence < 50) return;

                const box = document.createElement('div');
                box.className = 'lens-box';
                
                // Calculate position and size
                const x = word.bbox.x0 * scaleX;
                const y = word.bbox.y0 * scaleY;
                const width = (word.bbox.x1 - word.bbox.x0) * scaleX;
                const height = (word.bbox.y1 - word.bbox.y0) * scaleY;

                box.style.left = x + 'px';
                box.style.top = y + 'px';
                box.style.width = width + 'px';
                box.style.height = height + 'px';
                
                // Store the detected text inside the HTML element
                box.dataset.text = word.text;

                // 5. Click event to auto-fill
                box.onclick = function() {
                    const targetId = document.getElementById('active_input_target').value;
                    const inputField = document.getElementById(targetId);
                    
                    // If input already has text, append with a space (e.g., clicking "John" then "Michael")
                    if (inputField.value.trim() !== "") {
                        inputField.value += " " + this.dataset.text;
                    } else {
                        inputField.value = this.dataset.text;
                    }
                    
                    // Visual feedback
                    this.style.backgroundColor = 'rgba(255, 107, 0, 0.5)'; // Flash Orange
                    setTimeout(() => { this.style.backgroundColor = 'rgba(0, 255, 65, 0.1)'; }, 300);
                };

                overlayContainer.appendChild(box);
            });
        }).catch(err => {
            statusText.innerHTML = '<span class="text-red-500">Scan Failed: ' + err.message + '</span>';
        });
    }
</script>

</body>
</html>
